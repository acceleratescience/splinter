# =============================================================================
# Docker Compose - LiteLLM/vLLM Stack
# =============================================================================
#
# USAGE:
#   docker compose up -d
#
# REQUIRES:
#   .env file in the same directory (copy from .env.example)
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Postgres
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: litellm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # vLLM
  # ---------------------------------------------------------------------------
  # GPT-120b
  vllm-openai:
    environment:
      NVIDIA_VISIBLE_DEVICES: "0,1"
    image: vllm/vllm-openai:latest
    container_name: vllm-openai
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]
    networks:
      - default
      - monitoring
    command: >
      --model openai/gpt-oss-120b
      --gpu-memory-utilization 0.80
      --tensor-parallel-size 2
      --max-model-len 32768
      --max-num-seqs 256
      --port 8000
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 500s

  # Qwen3.5
  vllm-qwen:
    environment:
      NVIDIA_VISIBLE_DEVICES: "2"
    image: vllm/vllm-openai:latest
    container_name: vllm-qwen
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['2']
              capabilities: [gpu]
    networks:
      - default
      - monitoring
    command: >
      --model Qwen/Qwen3.5-27B-FP8
      --gpu-memory-utilization 0.80
      --tensor-parallel-size 1
      --max-model-len 32768
      --max-num-seqs 256
      --reasoning-parser qwen3
      --port 8001
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 500s
  # ---------------------------------------------------------------------------
  # LiteLLM
  # ---------------------------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LITELLM_PORT}:4000"  # Make sure bound to localhost
    depends_on:
      db:
        condition: service_healthy
      vllm-openai:
        condition: service_healthy
      vllm-qwen:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      NO_DOCS: "True"
      NO_REDOCS: "True"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml"]
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  postgres_data:

networks:
  default:
  monitoring:
    external: true
    name: monitoring_default