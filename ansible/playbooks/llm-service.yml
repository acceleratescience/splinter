---
# LLM Service playbook - deploys vLLM, LiteLLM, PostgreSQL, and Nginx configuration
# Run with: ansible-playbook -i inventory.ini playbooks/llm-service.yml

- name: Deploy LLM service stack
  hosts: gpu_servers
  become: true

  vars:
    repo_url: "git@github.com:acceleratescience/splinter.git"
    repo_path: "/opt/splinter"
    repo_branch: "main"
    stack_path: "{{ repo_path }}/stacks/llm-service"

  tasks:
    # ==================== Pre-flight Checks ====================
    - name: Verify Docker is running
      systemd:
        name: docker
        state: started
      register: docker_status

    - name: Verify NVIDIA Container Toolkit is configured
      command: docker info --format '{{ "{{" }}.Runtimes{{ "}}" }}'
      register: docker_runtimes
      changed_when: false
      failed_when: "'nvidia' not in docker_runtimes.stdout"

    - name: Test GPU access in Docker
      command: docker run --rm --gpus all nvidia/cuda:12.6.1-base-ubuntu24.04 nvidia-smi
      register: gpu_docker_test
      changed_when: false

    - name: Display GPU Docker test result
      debug:
        msg: "GPU access in Docker: OK"
      when: gpu_docker_test.rc == 0

    # ==================== Install Dependencies ====================
    - name: Install Nginx and fail2ban
      apt:
        name:
          - nginx
          - fail2ban
        state: present
        update_cache: yes

    # ==================== Update Repository ====================
    - name: Pull latest changes from git
      git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_path }}"
        version: "{{ repo_branch }}"
        update: yes
        accept_newhostkey: yes
      become: false
      register: git_result

    - name: Show if repo was updated
      debug:
        msg: "Repository updated: {{ git_result.changed }}"

    # ==================== Validate Configuration ====================
    - name: Check if stack directory exists
      stat:
        path: "{{ stack_path }}/docker-compose.yml"
      register: compose_file

    - name: Fail if stack directory not found
      fail:
        msg: |
          LLM service stack not found at {{ stack_path }}
          Make sure the repository is cloned to {{ repo_path }}
      when: not compose_file.stat.exists

    - name: Check if .env file exists
      stat:
        path: "{{ stack_path }}/.env"
      register: env_file

    - name: Fail if .env file not found
      fail:
        msg: |
          Environment file not found at {{ stack_path }}/.env

          Create it from the example:
            cp {{ stack_path }}/.env.example {{ stack_path }}/.env

          Then fill in the required values:
            - POSTGRES_PASSWORD
            - LITELLM_MASTER_KEY
            - DOMAIN
            - LITELLM_PORT
            - SSL_CERT_PATH
            - SSL_KEY_PATH
      when: not env_file.stat.exists

    - name: Load environment variables from .env
      slurp:
        src: "{{ stack_path }}/.env"
      register: env_file_content

    - name: Parse environment variables
      set_fact:
        env_vars: >-
          {{ env_vars | default({}) | combine({
            item.split('=', 1)[0]: item.split('=', 1)[1]
          }) }}
      loop: "{{ (env_file_content.content | b64decode).split('\n') }}"
      when: item | length > 0 and not item.startswith('#') and '=' in item

    - name: Validate required environment variables
      fail:
        msg: "Required variable {{ item }} is not set in .env"
      when: item not in env_vars or env_vars[item] | length == 0
      loop:
        - POSTGRES_PASSWORD
        - LITELLM_MASTER_KEY
        - DOMAIN
        - LITELLM_PORT
        - SSL_CERT_PATH
        - SSL_KEY_PATH

    # ==================== Configure Nginx ====================
    - name: Create Nginx snippets directory
      file:
        path: /etc/nginx/snippets
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install security snippet
      copy:
        src: "{{ stack_path }}/security.conf.template"
        dest: /etc/nginx/snippets/llm-security.conf
        remote_src: yes
        owner: root
        group: root
        mode: "0644"

    - name: Generate Nginx configuration
      shell: |
        export $(cat {{ stack_path }}/.env | grep -v '^#' | grep -v '^$' | xargs)
        envsubst '${DOMAIN} ${LITELLM_PORT} ${SSL_CERT_PATH} ${SSL_KEY_PATH}' < {{ stack_path }}/nginx.conf.template > /etc/nginx/sites-available/${DOMAIN}
      args:
        executable: /bin/bash

    - name: Enable Nginx site
      file:
        src: "/etc/nginx/sites-available/{{ env_vars.DOMAIN }}"
        dest: "/etc/nginx/sites-enabled/{{ env_vars.DOMAIN }}"
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Test Nginx configuration
      command: nginx -t
      changed_when: false

    - name: Reload Nginx
      systemd:
        name: nginx
        state: reloaded

    # ==================== Configure Fail2ban ====================
    - name: Install fail2ban jail configuration
      copy:
        src: "{{ stack_path }}/fail2ban-jail.local"
        dest: /etc/fail2ban/jail.local
        remote_src: yes
        owner: root
        group: root
        mode: "0644"

    - name: Install fail2ban filters
      copy:
        src: "{{ stack_path }}/filters/{{ item }}"
        dest: /etc/fail2ban/filter.d/{{ item }}
        remote_src: yes
        owner: root
        group: root
        mode: "0644"
      loop:
        - nginx-llm-blocked.conf
        - nginx-llm-auth.conf
        - nginx-llm-login.conf

    - name: Enable and restart fail2ban
      systemd:
        name: fail2ban
        state: restarted
        enabled: yes

    # ==================== Deploy LLM Stack ====================
    - name: Pull latest Docker images
      community.docker.docker_compose_v2:
        project_src: "{{ stack_path }}"
        pull: always
        state: present
      register: pull_result

    - name: Start LLM service stack
      community.docker.docker_compose_v2:
        project_src: "{{ stack_path }}"
        state: present
      register: compose_result

    - name: Display deployed containers
      debug:
        var: compose_result

    # ==================== Health Checks ====================
    - name: Wait for PostgreSQL to be ready
      community.docker.docker_container_info:
        name: litellm-db
      register: db_container
      until: db_container.container.State.Health.Status == "healthy"
      retries: 12
      delay: 5

    - name: Wait for vLLM OpenAI to be ready (this may take a while for model loading)
      command: docker exec vllm-openai curl -sf http://localhost:8000/health
      register: vllm_openai_health
      until: vllm_openai_health.rc == 0
      retries: 60
      delay: 10
      ignore_errors: true

    - name: Wait for vLLM Qwen to be ready
      command: docker exec vllm-qwen curl -sf http://localhost:8001/health
      register: vllm_qwen_health
      until: vllm_qwen_health.rc == 0
      retries: 60
      delay: 10
      ignore_errors: true

    - name: Wait for Speaches to be ready
      command: docker exec speaches curl -sf http://localhost:8000/health
      register: speaches_health
      until: speaches_health.rc == 0
      retries: 30
      delay: 5
      ignore_errors: true

    - name: Wait for vLLM Embedding to be ready
      command: docker exec vllm-embedding curl -sf http://localhost:8002/health
      register: vllm_embedding_health
      until: vllm_embedding_health.rc == 0
      retries: 30
      delay: 10
      ignore_errors: true

    - name: Wait for SGLang Diffusion to be ready
      command: docker exec sglang-diffusion curl -sf http://localhost:8003/health
      register: sglang_diffusion_health
      until: sglang_diffusion_health.rc == 0
      retries: 40
      delay: 10
      ignore_errors: true

    - name: Wait for SGLang Image Edit to be ready
      command: docker exec sglang-image-edit curl -sf http://localhost:8004/health
      register: sglang_image_edit_health
      until: sglang_image_edit_health.rc == 0
      retries: 40
      delay: 10
      ignore_errors: true

    - name: Wait for LiteLLM to be ready
      uri:
        url: "http://127.0.0.1:{{ env_vars.LITELLM_PORT }}/health"
        headers:
          Authorization: "Bearer {{ env_vars.LITELLM_MASTER_KEY }}"
        status_code: 200
      register: litellm_health
      until: litellm_health.status == 200
      retries: 24
      delay: 5

    - name: Test Nginx reverse proxy (expects 401 - confirms Nginx is proxying and auth is enforced)
      uri:
        url: "https://{{ env_vars.DOMAIN }}/health"
        status_code: 401
        validate_certs: false
      register: nginx_proxy_health

    # ==================== Summary ====================
    - name: Display LLM service stack status
      debug:
        msg: |
          ========================================
          LLM Service Stack Deployed Successfully!
          ========================================

          Services:
            - vLLM OpenAI (gpt-oss-120b):       http://127.0.0.1:8000 (internal, GPU 0-1)
            - vLLM Qwen (Qwen3.5-27B-FP8):      http://127.0.0.1:8001 (internal, GPU 2)
            - vLLM Embedding (Qwen3-Embedding):  http://127.0.0.1:8002 (internal, GPU 3)
            - Speaches (whisper/tts):             http://127.0.0.1:8000 (internal, GPU 3)
            - SGLang Diffusion (Z-Image-Turbo):  http://127.0.0.1:8003 (internal, GPU 3)
            - SGLang Image Edit:                 http://127.0.0.1:8004 (internal, GPU 3)
            - LiteLLM Proxy:                     http://127.0.0.1:{{ env_vars.LITELLM_PORT }} (internal)
            - API:                               https://{{ env_vars.DOMAIN }}

          Health Status:
            - PostgreSQL:       healthy
            - vLLM OpenAI:      {{ 'ready' if vllm_openai_health.rc == 0 else 'loading (docker logs vllm-openai)' }}
            - vLLM Qwen:        {{ 'ready' if vllm_qwen_health.rc == 0 else 'loading (docker logs vllm-qwen)' }}
            - Speaches:         {{ 'ready' if speaches_health.rc == 0 else 'loading (docker logs speaches)' }}
            - vLLM Embedding:   {{ 'ready' if vllm_embedding_health.rc == 0 else 'loading (docker logs vllm-embedding)' }}
            - SGLang Diffusion: {{ 'ready' if sglang_diffusion_health.rc == 0 else 'loading (docker logs sglang-diffusion)' }}
            - SGLang Img Edit:  {{ 'ready' if sglang_image_edit_health.rc == 0 else 'loading (docker logs sglang-image-edit)' }}
            - LiteLLM:          ready
            - Nginx:            ready (auth enforced)
            - Fail2ban:         active

          Admin UI: https://{{ env_vars.DOMAIN }}/ui

          Useful commands:
            - View logs:     cd {{ stack_path }} && docker compose logs -f
            - Restart:       cd {{ stack_path }} && docker compose restart
            - Stop:          cd {{ stack_path }} && docker compose down
          ========================================